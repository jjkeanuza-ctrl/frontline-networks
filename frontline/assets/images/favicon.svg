  <!-- F -->
  <rect x="7" y="10" width="3" height="12" fill="url(#fg1)" rx="0.5"/>
  <rect x="7" y="10" width="9" height="3"  fill="url(#fg1)" rx="0.5"/>
  <rect x="7" y="15" width="7" height="2.5" fill="url(#fg2)" rx="0.5"/>

  <!-- N -->
  <rect x="18" y="10" width="3" height="12" fill="url(#fg1)" rx="0.5"/>
  <rect x="24" y="10" width="3" height="12" fill="url(#fg1)" rx="0.5"/>
  <line x1="18" y1="10" x2="27" y2="22" stroke="url(#fg2)" stroke-width="3" stroke-linecap="round"/>
</svg>
