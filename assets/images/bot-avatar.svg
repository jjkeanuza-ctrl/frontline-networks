<svg width="512" height="512" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#e0f4ff"/>
    </linearGradient>
    <radialGradient id="gGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(79,195,247,0.18)"/>
      <stop offset="100%" stop-color="rgba(6,12,20,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="110" cy="110" r="110" fill="#060c14"/>
  <circle cx="110" cy="110" r="110" fill="url(#gGlow)"/>
  <circle cx="110" cy="110" r="106" fill="none" stroke="rgba(79,195,247,0.12)" stroke-width="1"/>

  <!-- Bot body -->
  <rect x="52" y="72" width="116" height="100" rx="18" fill="none" stroke="url(#g1)" stroke-width="2.5"/>
  <rect x="58" y="78" width="104" height="88" rx="14" fill="rgba(6,16,30,0.88)" stroke="rgba(79,195,247,0.22)" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="88"  cy="108" r="10" fill="rgba(6,16,30,0.9)" stroke="url(#g1)" stroke-width="2"/>
  <circle cx="132" cy="108" r="10" fill="rgba(6,16,30,0.9)" stroke="url(#g1)" stroke-width="2"/>
  <circle cx="88"  cy="108" r="4.5" fill="#4fc3f7" opacity="0.92"/>
  <circle cx="132" cy="108" r="4.5" fill="#4fc3f7" opacity="0.92"/>
  <circle cx="89.5" cy="106.5" r="1.5" fill="#ffffff" opacity="0.85"/>
  <circle cx="133.5" cy="106.5" r="1.5" fill="#ffffff" opacity="0.85"/>

  <!-- Mouth grid -->
  <rect x="88"  y="128" width="5" height="3" rx="1" fill="rgba(79,195,247,0.6)"/>
  <rect x="97"  y="128" width="5" height="3" rx="1" fill="rgba(79,195,247,0.45)"/>
  <rect x="106" y="128" width="5" height="3" rx="1" fill="rgba(79,195,247,0.55)"/>
  <rect x="115" y="128" width="5" height="3" rx="1" fill="rgba(79,195,247,0.4)"/>
  <rect x="124" y="128" width="5" height="3" rx="1" fill="rgba(79,195,247,0.6)"/>

  <!-- Antenna -->
  <line x1="110" y1="72" x2="110" y2="50" stroke="url(#g1)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="110" cy="44" r="6" fill="none" stroke="url(#g1)" stroke-width="2"/>
  <circle cx="110" cy="44" r="3" fill="#4fc3f7"/>

  <!-- Side ears -->
  <rect x="34" y="96" width="18" height="28" rx="5" fill="rgba(6,16,30,0.9)" stroke="url(#g1)" stroke-width="1.8"/>
  <rect x="38" y="103" width="10" height="4" rx="2" fill="rgba(79,195,247,0.5)"/>
  <rect x="38" y="111" width="10" height="4" rx="2" fill="rgba(79,195,247,0.3)"/>

  <rect x="168" y="96" width="18" height="28" rx="5" fill="rgba(6,16,30,0.9)" stroke="url(#g1)" stroke-width="1.8"/>
  <rect x="172" y="103" width="10" height="4" rx="2" fill="rgba(79,195,247,0.5)"/>
  <rect x="172" y="111" width="10" height="4" rx="2" fill="rgba(79,195,247,0.3)"/>

  <!-- Legs -->
  <rect x="78"  y="170" width="22" height="14" rx="5" fill="none" stroke="url(#g2)" stroke-width="1.8"/>
  <rect x="120" y="170" width="22" height="14" rx="5" fill="none" stroke="url(#g2)" stroke-width="1.8"/>

  <!-- FN-BOT badge -->
  <rect x="88" y="88" width="44" height="16" rx="4" fill="rgba(79,195,247,0.1)" stroke="rgba(79,195,247,0.32)" stroke-width="1"/>
  <text x="110" y="100" text-anchor="middle" font-family="'Courier New', Courier, monospace"
    font-size="9" font-weight="700" letter-spacing="2" fill="#4fc3f7">FN-BOT</text>

  <!-- Hex accent top -->
  <polygon points="110,6 130,17 130,39 110,50 90,39 90,17"
    fill="none" stroke="rgba(79,195,247,0.18)" stroke-width="1"/>
</svg>
