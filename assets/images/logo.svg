<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
    <linearGradient id="lg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#e0f4ff"/>
    </linearGradient>
    <linearGradient id="lgText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b0cfe8"/>
    </linearGradient>
  </defs>

  <!-- Hexagon shield icon -->
  <polygon points="40,4 69,21 69,55 40,72 11,55 11,21"
    fill="none" stroke="url(#lg1)" stroke-width="1.8"/>
  <polygon points="40,10 63,23 63,53 40,66 17,53 17,23"
    fill="rgba(6,16,30,0.9)" stroke="rgba(79,195,247,0.25)" stroke-width="1"/>

  <!-- F letterform -->
  <rect x="26" y="25" width="5" height="30" fill="url(#lg1)" rx="1"/>
  <rect x="26" y="25" width="22" height="5" fill="url(#lg1)" rx="1"/>
  <rect x="26" y="37" width="17" height="4.5" fill="url(#lg2)" rx="1"/>

  <!-- N letterform -->
  <rect x="52" y="25" width="5" height="30" fill="url(#lg1)" rx="1"/>
  <rect x="63" y="25" width="5" height="30" fill="url(#lg1)" rx="1"/>
  <line x1="52" y1="25" x2="68" y2="55" stroke="url(#lg2)" stroke-width="5" stroke-linecap="round"/>

  <!-- Corner dots -->
  <circle cx="40" cy="4"  r="1.5" fill="#4fc3f7" opacity="0.85"/>
  <circle cx="69" cy="21" r="1.5" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="69" cy="55" r="1.5" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="40" cy="72" r="1.5" fill="#4fc3f7" opacity="0.85"/>
  <circle cx="11" cy="55" r="1.5" fill="#4fc3f7" opacity="0.6"/>
  <circle cx="11" cy="21" r="1.5" fill="#4fc3f7" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="88" y="38" font-family="'Courier New', Courier, monospace"
    font-size="22" font-weight="700" letter-spacing="3"
    fill="url(#lgText)">FRONTLINE</text>
  <text x="90" y="56" font-family="'Courier New', Courier, monospace"
    font-size="11" letter-spacing="7.5"
    fill="rgba(79,195,247,0.55)">NETWORKS</text>
</svg>
